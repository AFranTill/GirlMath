<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girl Math - Flat Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .auth { display: block; }
        .tracker { display: none; }
        .logged-in .auth { display: none; }
        .logged-in .tracker { display: block; }
        .category { margin: 20px 0; }
        .expense { border: 1px solid #ccc; padding: 10px; margin: 5px 0; }
        .tabs { display: flex; }
        .tab { padding: 10px; cursor: pointer; background: #f0f0f0; }
        .tab.active { background: #ddd; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <h1>Girl Math - Flat Expense Tracker</h1>

    <div class="auth">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="logIn()">Log In</button>
        <button onclick="signUp()">Sign Up</button>
        <div id="output" style="margin-top: 10px; color: red;"></div>
    </div>

    <div class="tracker">
        <h2>Welcome, <span id="userEmail"></span> (<span id="userRole"></span>)</h2>
        <button onclick="logOut()">Log Out</button>

        <div id="role-selection" style="display: none;">
            <h3>Select Your Role</h3>
            <button onclick="setRole('head')">Head Tenant</button>
            <button onclick="setRole('regular')">Regular Flatmate</button>
        </div>

        <div id="expense-tracker" style="display: none;">
            <div class="tabs">
                <!-- Tabs will be added dynamically -->
            </div>

            <!-- Content will be added dynamically -->

            <div id="add-category" style="display: none;">
                <h3>Add New Category</h3>
                <input type="text" id="new-category" placeholder="Category Name">
                <button onclick="addCategory()">Add Category</button>
            </div>

            <h3>Transactions</h3>
            <table id="tx-table" border="1">
                <thead>
                    <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Type</th>
                    </tr>
                </thead>
                <tbody id="tx-body"></tbody>
            </table>

            <button onclick="loadTransactions()">Load Transactions</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>


    
    <script>
    async function loadTransactions() {
        try {
            const { data: { session }, error: sessionError } = await sb.auth.getSession();
            if (sessionError || !session) {
                throw new Error('Not logged in to Supabase.');
            }

            const res = await fetch('http://localhost:3000/api/transactions', {
                headers: { Authorization: `Bearer ${session.access_token}` }
            });

            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.error || `HTTP ${res.status}`);
            }

            const transactions = await res.json();
            console.log('Transactions loaded:', transactions);

            const tbody = document.getElementById('tx-body');
            tbody.innerHTML = '';

            if (!Array.isArray(transactions)) {
                throw new Error('Invalid response format');
            }

            transactions.forEach(tx => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(tx.date).toLocaleDateString('en-NZ')}</td>
                    <td>${tx.description}</td>
                    <td style="color: ${tx.amount < 0 ? 'red' : 'green'}">
                    $${tx.amount.toFixed(2)}
                    </td>
                    <td>${tx.type}</td>
                `;
                tbody.appendChild(row);
            });
        } catch (error) {
            console.error('Error loading transactions:', error);
            alert('Failed to load transactions: ' + error.message);
        }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>

    <script>
        // firebase.initializeApp({
        //     apiKey: "AIzaSyAHJAtQBsu8Q3caeL-OosrFAoxzOyiG4VQ",
        //     authDomain: "girlmath-5ceba.firebaseapp.com",
        //     projectId: "girlmath-5ceba",
        //     storageBucket: "girlmath-5ceba.firebasestorage.app",
        //     messagingSenderId: "664776394529",
        //     appId: "1:664776394529:web:7c8c742a693be94d70e060",
        //     measurementId: "G-WRXCKW88RK"
        // });

        // const auth = firebase.auth();
        // const db = firebase.firestore();

        let categories = ['rent', 'bills', 'grocery'];
        let userRole = null;

        const { createClient } = supabase;
        const sb = createClient(
            'https://fklqqjwvfjjasthdayln.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrbHFxand2ZmpqYXN0aGRheWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Nzc2NzcsImV4cCI6MjA5MzI1MzY3N30.sFMfPIf3BxoUjHc8BUflI3D0qGYBgH1npNO2Az-aiqo'
        );
        const outputEl = document.getElementById('output');

        async function signUp() {
            outputEl.textContent = '';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sb.auth.signUp({ email, password });
            if (error) outputEl.textContent = 'Error: ' + error.message;
            else outputEl.textContent = 'Signed up! Check your email to confirm.';
        }

        async function logIn() {
            outputEl.textContent = '';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                outputEl.textContent = 'Error: ' + error.message;
            } else {
                outputEl.textContent = 'Logged in as: ' + data.user.email;
            }
        }

        async function callAPI() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { outputEl.textContent = 'Not logged in!'; return; }

            const res = await fetch('http://localhost:3000/api/me', {
                headers: { Authorization: `Bearer ${session.access_token}` }
            });
            const data = await res.json();
            outputEl.textContent = JSON.stringify(data, null, 2);
        }

        sb.auth.onAuthStateChange((event, session) => {
            const user = session?.user || null;
            if (user) {
                document.body.classList.add('logged-in');
                document.getElementById('userEmail').textContent = user.email;
                userRole = localStorage.getItem('userRole');
                if (userRole) {
                    document.getElementById('userRole').textContent = userRole === 'head' ? 'Head Tenant' : 'Regular Flatmate';
                    showTracker();
                } else {
                    document.getElementById('role-selection').style.display = 'block';
                }
            } else {
                document.body.classList.remove('logged-in');
                document.getElementById('role-selection').style.display = 'none';
                document.getElementById('expense-tracker').style.display = 'none';
            }
        });

        function setRole(role) {
            userRole = role;
            localStorage.setItem('userRole', role);
            document.getElementById('userRole').textContent = role === 'head' ? 'Head Tenant' : 'Regular Flatmate';
            document.getElementById('role-selection').style.display = 'none';
            showTracker();
        }

        function showTracker() {
            document.getElementById('expense-tracker').style.display = 'block';
            if (userRole === 'head') {
                document.getElementById('add-category').style.display = 'block';
            }
            if (typeof db !== 'undefined') {
                loadCategories();
                loadExpenses();
            }
        }

        async function loadCategories() {
            const doc = await db.collection('settings').doc('categories').get();
            if (doc.exists) {
                categories = doc.data().list || ['rent', 'bills', 'grocery'];
            } else {
                categories = ['rent', 'bills', 'grocery'];
            }
            updateTabs();
        }

        function updateTabs() {
            const tabs = document.querySelector('.tabs');
            tabs.innerHTML = '';
            categories.forEach((cat, index) => {
                const tab = document.createElement('div');
                tab.className = 'tab';
                if (index === 0) tab.classList.add('active');
                tab.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                tab.onclick = () => showTab(cat);
                tabs.appendChild(tab);

                // Add content if not exists
                if (!document.getElementById(cat)) {
                    const content = document.createElement('div');
                    content.id = cat;
                    content.className = 'tab-content';
                    if (index === 0) content.classList.add('active');
                    content.innerHTML = `
                        <h3>${cat.charAt(0).toUpperCase() + cat.slice(1)} Expenses</h3>
                        <div id="${cat}-list"></div>
                        <form onsubmit="addExpense('${cat}'); return false;">
                            <input type="number" id="${cat}-amount" placeholder="Amount" required>
                            <input type="text" id="${cat}-desc" placeholder="Description" required>
                            <button type="submit">Add Expense</button>
                        </form>
                    `;
                    document.getElementById('expense-tracker').insertBefore(content, document.getElementById('add-category'));
                }
            });
        }

        function showTab(category) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const index = categories.indexOf(category);
            if (index !== -1) {
                document.querySelector(`.tabs .tab:nth-child(${index + 1})`).classList.add('active');
                document.getElementById(category).classList.add('active');
            }
        }

        async function addExpense(category) {
            const amount = document.getElementById(`${category}-amount`).value;
            const desc = document.getElementById(`${category}-desc`).value;
            const user = window.auth?.currentUser;
            if (!user || typeof db === 'undefined') {
                if (typeof outputEl !== 'undefined') {
                    outputEl.textContent = 'Expense storage is not configured for Supabase auth yet.';
                }
                return;
            }

            await db.collection('expenses').add({
                category,
                amount: parseFloat(amount),
                description: desc,
                date: new Date(),
                userId: user.uid,
                userEmail: user.email
            });

            document.getElementById(`${category}-amount`).value = '';
            document.getElementById(`${category}-desc`).value = '';
            loadExpenses();
        }

        async function loadExpenses() {
            if (typeof db === 'undefined') {
                return;
            }
            const user = window.auth?.currentUser;
            if (!user) return;

            const snapshot = await db.collection('expenses').where('userId', '==', user.uid).get();
            const expenses = {};
            categories.forEach(cat => expenses[cat] = []);
            snapshot.forEach(doc => {
                const data = doc.data();
                if (expenses[data.category]) {
                    expenses[data.category].push({ ...data, id: doc.id });
                }
            });

            categories.forEach(cat => {
                const list = document.getElementById(`${cat}-list`);
                if (list) {
                    list.innerHTML = expenses[cat].map(exp => `
                        <div class="expense">
                            <strong>${exp.description}</strong> - $${exp.amount} - ${exp.date.toDate().toLocaleDateString()}
                            <button onclick="deleteExpense('${exp.id}')">Delete</button>
                        </div>
                    `).join('');
                }
            });
        }

        async function deleteExpense(id) {
            if (typeof db === 'undefined') return;
            await db.collection('expenses').doc(id).delete();
            loadExpenses();
        }

        async function addCategory() {
            if (userRole !== 'head') return;
            const name = document.getElementById('new-category').value.trim().toLowerCase();
            if (name && !categories.includes(name)) {
                categories.push(name);
                await db.collection('settings').doc('categories').set({ list: categories });
                updateTabs();
                document.getElementById('new-category').value = '';
            }
        }
    </script>
</body>
</html>
